<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ AI WAF Scanner - Quét Mã Độc</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 0.95em;
        }

        .separator {
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            margin-bottom: 30px;
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        #userInput {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
        }

        #userInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #scanBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #scanBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        #scanBtn:active {
            transform: translateY(0);
        }

        #scanBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #clearBtn {
            background: #f0f0f0;
            color: #333;
        }

        #clearBtn:hover {
            background: #e0e0e0;
        }

        .result-box {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .result-box.show {
            display: block;
        }

        .result-safe {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }

        .result-danger {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }

        .result-warning {
            background: #fff3cd;
            border: 2px solid #ffc107;
            color: #856404;
        }

        .result-box h3 {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-box p {
            margin: 8px 0;
            font-size: 0.95em;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .loading.show {
            display: block;
        }

        .stats {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 0.9em;
            color: #666;
        }

        .stats p {
            margin: 5px 0;
        }

        .threat-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
            font-weight: 600;
            font-size: 0.85em;
        }

        .safe-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            font-weight: 600;
            font-size: 0.85em;
        }

        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
            color: #0c5aa0;
            font-size: 0.9em;
        }

        .info-box strong {
            display: block;
            margin-bottom: 5px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ AI WAF Scanner</h1>
            <p>Quét mã độc Website bằng AI Deep Learning</p>
        </div>

        <div class="separator"></div>

        <form id="scanForm">
            <div class="form-group">
                <label for="userInput">📝 Nhập nội dung hoặc URL để quét:</label>
                <textarea 
                    id="userInput" 
                    placeholder="Ví dụ: admin' OR 1=1 --&#10;          &lt;img src='x' onerror='alert(1)'&gt;&#10;          ../../../../etc/passwd"
                    rows="5"
                ></textarea>
            </div>

            <div class="button-group">
                <button type="button" id="scanBtn">🔍 Bắt Đầu Quét</button>
                <button type="button" id="clearBtn">🗑️ Xóa</button>
            </div>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>⏳ Đang quét với AI...</p>
        </div>

        <div class="result-box" id="resultBox">
            <!-- Kết quả sẽ được chèn vào đây -->
        </div>

        <div class="stats" id="stats" style="display: none;">
            <p><strong>📊 Chi tiết:</strong></p>
            <p>Thời gian quét: <span id="scanTime">0</span>ms</p>
            <p>Server: <span id="serverStatus">Kết nối</span></p>
        </div>

        <div class="info-box">
            <strong>💡 Lưu ý:</strong>
            Giao diện này sử dụng AI Bi-LSTM để phát hiện các loại tấn công: SQLi, XSS, Command Injection, Path Traversal, SSRF, vv...
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:5000';
        const THREAT_TYPES = {
            'SQLi': '💉 SQL Injection',
            'XSS': '🔗 Cross-Site Scripting',
            'Command Injection': '⚙️ Command Injection',
            'Path Traversal': '📂 Path Traversal',
            'SSRF': '🌐 Server-Side Request Forgery',
            'CSRF': '🔄 Cross-Site Request Forgery',
            'Normal': '✅ Dữ liệu An Toàn',
            'JS-SYNTAX': '📜 Cú pháp JavaScript'
        };

        const scanBtn = document.getElementById('scanBtn');
        const clearBtn = document.getElementById('clearBtn');
        const userInput = document.getElementById('userInput');
        const resultBox = document.getElementById('resultBox');
        const loading = document.getElementById('loading');
        const stats = document.getElementById('stats');
        const scanForm = document.getElementById('scanForm');

        // Xóa dữ liệu
        clearBtn.addEventListener('click', () => {
            userInput.value = '';
            resultBox.classList.remove('show');
            stats.style.display = 'none';
            resultBox.innerHTML = '';
            userInput.focus();
        });

        // Quét
        scanBtn.addEventListener('click', async () => {
            const input = userInput.value.trim();

            if (!input) {
                alert('⚠️ Vui lòng nhập dữ liệu cần quét!');
                userInput.focus();
                return;
            }

            // Kiểm tra kết nối server
            try {
                const pingResponse = await fetch(API_URL + '/search?q=test', {
                    method: 'GET',
                    mode: 'no-cors'
                });
            } catch (error) {
                alert('❌ Lỗi: Không thể kết nối tới AI Server (http://127.0.0.1:5000)\n\nVui lòng:\n1. Chắc chắn webg.py đang chạy\n2. Kiểm tra port 5000 không bị chiếm dụng');
                return;
            }

            await performScan(input);
        });

        // Cho phép quét bằng Enter + Shift
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.shiftKey) {
                scanBtn.click();
            }
        });

        async function performScan(payload) {
            scanBtn.disabled = true;
            loading.classList.add('show');
            resultBox.classList.remove('show');

            const startTime = Date.now();

            try {
                // Use POST for better compatibility with special characters
                const response = await fetch(`${API_URL}/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ q: payload })
                });

                const endTime = Date.now();
                const scanTime = endTime - startTime;

                // Xử lý phản hồi
                if (response.status === 403) {
                    // Phát hiện mã độc
                    const result = await response.json();
                    displayDangerResult(result, scanTime);
                } else if (response.status === 200) {
                    // An toàn
                    displaySafeResult(scanTime);
                } else {
                    displayErrorResult('Server trả về lỗi: ' + response.status);
                }

                // Cập nhật stats
                updateStats(scanTime);

            } catch (error) {
                console.error('Lỗi:', error);
                displayErrorResult('❌ Lỗi kết nối: ' + error.message);
            } finally {
                scanBtn.disabled = false;
                loading.classList.remove('show');
            }
        }

        function displaySafeResult(scanTime) {
            resultBox.innerHTML = `
                <div class="result-safe">
                    <h3>
                        <span class="safe-badge">✅ AN TOÀN</span>
                    </h3>
                    <p><strong>Phán định:</strong> Dữ liệu được xác nhận là sạch sẽ và an toàn.</p>
                    <p><strong>Thời gian quét:</strong> ${scanTime}ms</p>
                    <p style="color: #888; font-size: 0.85em; margin-top: 10px;">
                        AI không phát hiện bất kỳ hình thức tấn công nào. Dữ liệu này có thể được xử lý an toàn.
                    </p>
                </div>
            `;
            resultBox.classList.add('show');
        }

        function displayDangerResult(data, scanTime) {
            const threatType = data.reason || data.label || 'Unknown Threat';
            const confidence = data.confidence || '?.??%';
            const friendlyName = THREAT_TYPES[threatType] || threatType;

            resultBox.innerHTML = `
                <div class="result-danger">
                    <h3>
                        <span class="threat-badge">⛔ PHÁT HIỆN MẢ ĐỘC</span>
                    </h3>
                    <p><strong>Loại tấn công:</strong> ${friendlyName}</p>
                    <p><strong>Độ tự tin:</strong> ${confidence}</p>
                    <p><strong>Thời gian quét:</strong> ${scanTime}ms</p>
                    <p style="color: #721c24; font-size: 0.85em; margin-top: 10px; background: rgba(0,0,0,0.05); padding: 8px; border-radius: 4px;">
                        ⚠️ Dữ liệu này có khả năng chứa mã độc và sẽ bị Tường Lửa AI chặn. Vui lòng kiểm tra lại.
                    </p>
                </div>
            `;
            resultBox.classList.add('show');
        }

        function displayErrorResult(message) {
            resultBox.innerHTML = `
                <div class="result-warning">
                    <h3>⚠️ LỖI</h3>
                    <p>${message}</p>
                </div>
            `;
            resultBox.classList.add('show');
        }

        function updateStats(scanTime) {
            document.getElementById('scanTime').textContent = scanTime;
            stats.style.display = 'block';
        }

        // Focus vào input lúc tải trang
        window.addEventListener('load', () => {
            userInput.focus();
        });
    </script>
</body>
</html>
